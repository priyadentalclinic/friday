name: Build FRIDAY APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK on GitHub (No Queue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache C++ Build
        uses: actions/cache@v4
        with:
          path: android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild Android (generates native android/ folder)
        run: npx expo prebuild --platform android

      - name: Build Expo Android Bundle
        run: npx expo export:embed --platform android --dev false --entry-file node_modules/expo/AppEntry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4096m -Xms512m -Dfile.encoding=UTF-8 -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FRIDAY-Mark-II-5-arm64
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload to high-speed mirror (Gofile.io)
        run: |
          curl -L -F "file=@android/app/build/outputs/apk/debug/app-debug.apk" https://upload.gofile.io/uploadfile
