Name: Build FRIDAY APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK on GitHub (No Queue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild Android (generates native android/ folder)
        run: npx expo prebuild --platform android --clean

      - name: Build Expo Android Bundle
        run: npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4096m -Xms512m -Dfile.encoding=UTF-8"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FRIDAY-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
